        function calculateDashboardStats(period) {
            // 获取时间范围
            const now = new Date();
            let startDate, endDate;

            switch(period) {
                case 'week':
                    startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay());
                    endDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() - now.getDay() + 6);
                    break;
                case 'month':
                    startDate = new Date(now.getFullYear(), now.getMonth(), 1);
                    endDate = new Date(now.getFullYear(), now.getMonth() + 1, 0);
                    break;
                case 'quarter':
                    const quarter = Math.floor(now.getMonth() / 3);
                    startDate = new Date(now.getFullYear(), quarter * 3, 1);
                    endDate = new Date(now.getFullYear(), quarter * 3 + 3, 0);
                    break;
                case 'halfYear':
                    const half = now.getMonth() < 6 ? 0 : 6;
                    startDate = new Date(now.getFullYear(), half, 1);
                    endDate = new Date(now.getFullYear(), half + 6, 0);
                    break;
                case 'year':
                    startDate = new Date(now.getFullYear(), 0, 1);
                    endDate = new Date(now.getFullYear(), 11, 31);
                    break;
            }

            const startStr = startDate.toISOString().split('T')[0];
            const endStr = endDate.toISOString().split('T')[0];

            // 筛选时间范围内的素材
            const materials = appData.materials.filter(m => {
                return m.endDate >= startStr && m.startDate <= endStr;
            });

            const total = materials.length;
            const completed = materials.filter(m => m.status === '已完成').length;
            const inProgress = materials.filter(m => m.status === '进行中').length;
            const pending = materials.filter(m => m.status === '未启动').length;

            const byType = {};
            materials.forEach(m => {
                byType[m.typeId] = (byType[m.typeId] || 0) + 1;
            });

            return {
                total,
                completed,
                inProgress,
                pending,
                completedPercent: total > 0 ? (completed / total * 100) : 0,
                inProgressPercent: total > 0 ? (inProgress / total * 100) : 0,
                pendingPercent: total > 0 ? (pending / total * 100) : 0,
                byType
            };
        }

        function saveMaterial() {
            const id = document.getElementById('materialId').value;
            const name = document.getElementById('materialName').value.trim();
            const versionId = document.getElementById('materialVersion').value;
            const typeId = document.getElementById('materialType').value;
            const priority = document.getElementById('materialPriority').value;
            const ownerId = document.getElementById('materialOwner').value;
            const method = document.getElementById('materialMethod').value;
            const startDate = document.getElementById('materialStartDate').value;
            const endDate = document.getElementById('materialEndDate').value;
            const brief = document.getElementById('materialBrief').value.trim();

            if (!name || !versionId || !typeId || !priority || !ownerId || !startDate || !endDate) {
                alert('请填写所有必填项');
                return;
            }

            if (new Date(endDate) < new Date(startDate)) {
                alert('结束日期不能早于开始日期');
                return;
            }

            const imagePreview = document.getElementById('imagePreview');
            const image = imagePreview.style.display !== 'none' ? imagePreview.querySelector('img')?.src : null;

            if (id) {
                // 编辑
                const material = appData.materials.find(m => m.id === id);
                if (material) {
                    material.name = name;
                    material.versionId = versionId;
                    material.typeId = typeId;
                    material.priority = parseInt(priority);
                    material.ownerId = ownerId;
                    material.method = method;
                    material.startDate = startDate;
                    material.endDate = endDate;
                    material.brief = brief;
                    material.image = image;
                    material.updatedAt = new Date().toISOString();
                    
                    // 更新状态
                    updateMaterialStatus(material);
                }
            } else {
                // 新建
                const newMaterial = {
                    id: Date.now().toString(),
                    name,
                    versionId,
                    typeId,
                    priority: parseInt(priority),
                    ownerId,
                    method,
                    startDate,
                    endDate,

                appData.materials.push(newMaterial);

            saveData();
            renderAll();
            closeMaterialModal();

            if (progresses.length === 0) {

            const allCompleted = progresses.every(p => p.status === '已完成');
            const hasInProgress = progresses.some(p => p.status === '进行中');

            if (allCompleted) {
                material.status = '已完成';

            document.getElementById('progressMaterialId').value = materialId;

            modal.classList.add('active');
        }

        function openProgressEditModal(materialId, progressId) {
            const material = appData.materials.find(m => m.id === materialId);
            if (!material) return;

            const progress = material.progresses.find(p => p.id === progressId);
            if (!progress) return;

            const modal = document.getElementById('progressModal');
            const title = document.getElementById('progressModalTitle');
            const form = document.getElementById('progressForm');

            title.textContent = '编辑进度';
            document.getElementById('progressMaterialId').value = materialId;
            document.getElementById('progressId').value = progressId;
            document.getElementById('progressName').value = progress.name;
            document.getElementById('progressStage').value = progress.stage;
            document.getElementById('progressStatus').value = progress.status;
            document.getElementById('progressStartDate').value = progress.startDate;
            document.getElementById('progressEndDate').value = progress.endDate;
            document.getElementById('progressNote').value = progress.note || '';

            if (progress.image) {
                const preview = document.getElementById('progressImagePreview');
                preview.innerHTML = `<img src="${progress.image}" alt="${progress.name}">`;
                preview.style.display = 'block';
            }

            modal.classList.add('active');
        }

        function closeProgressModal() {
            document.getElementById('progressModal').classList.remove('active');
        }

        function saveProgress() {
            const materialId = document.getElementById('progressMaterialId').value;
            const progressId = document.getElementById('progressId').value;
            const name = document.getElementById('progressName').value.trim();
            const stage = document.getElementById('progressStage').value;
            const status = document.getElementById('progressStatus').value;
            const startDate = document.getElementById('progressStartDate').value;
            const endDate = document.getElementById('progressEndDate').value;
            const note = document.getElementById('progressNote').value.trim();

            if (!name || !stage || !status || !startDate || !endDate) {
                alert('请填写所有必填项');
                return;
            }

            if (new Date(endDate) < new Date(startDate)) {
                alert('结束日期不能早于开始日期');
                return;
            }

            const material = appData.materials.find(m => m.id === materialId);
            if (!material) return;

            const imagePreview = document.getElementById('progressImagePreview');
            const image = imagePreview.style.display !== 'none' ? imagePreview.querySelector('img')?.src : null;

            if (!material.progresses) {
                material.progresses = [];
            }

            if (progressId) {
                // 编辑
                const progress = material.progresses.find(p => p.id === progressId);
                if (progress) {
                    progress.name = name;
                    progress.stage = stage;
                    progress.status = status;
                    progress.startDate = startDate;
                    progress.endDate = endDate;
                    progress.note = note;
                    progress.image = image;
                    progress.updatedAt = new Date().toISOString();
                }
            } else {
                // 新建
                const newProgress = {
                    id: Date.now().toString(),
                    name,
                    stage,
                    status,
                    startDate,
                    endDate,
                    note,
                    image,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                material.progresses.push(newProgress);
            }

            // 更新素材状态和阶段
            updateMaterialStatus(material);
            material.stage = stage;
            material.updatedAt = new Date().toISOString();

            saveData();
            renderAll();
            closeProgressModal();
            
            // 如果详情面板打开，刷新它
            if (appData.currentMaterial?.id === materialId) {
                viewMaterial(materialId);
            }
        }

        function deleteProgress(materialId, progressId) {
            if (!confirm('确定要删除这个进度吗？')) return;

            const material = appData.materials.find(m => m.id === materialId);
            if (!material) return;

            const index = material.progresses.findIndex(p => p.id === progressId);
            if (index > -1) {
                material.progresses.splice(index, 1);
                updateMaterialStatus(material);
                saveData();
                renderAll();
                
                if (appData.currentMaterial?.id === materialId) {
                    viewMaterial(materialId);
                }
            }
        }

        // ==================== 模板管理 ====================
        function openTemplateModal() {
            renderTemplateGrid();
            document.getElementById('templateModal').classList.add('active');
        }

        function closeTemplateModal() {
            document.getElementById('templateModal').classList.remove('active');
        }

        function renderTemplateGrid() {
            const grid = document.getElementById('templateGrid');

            if (appData.templates.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div class="empty-text">暂无模板</div>
                    </div>
                `;
                return;
            }

            grid.innerHTML = appData.templates.map(t => `
                <div class="template-card">
                    <div class="template-actions">
                        <div class="template-action-btn" onclick="event.stopPropagation(); openTemplateEditModal('${t.id}')" title="编辑">✏️</div>
                        <div class="template-action-btn" onclick="event.stopPropagation(); deleteTemplate('${t.id}')" title="删除">🗑️</div>
                    </div>
                    <div class="template-icon">${t.icon}</div>
                    <div class="template-name">${t.name}</div>
                    <div class="template-desc">${t.desc}</div>
                    <div class="template-count">${t.types.length} 个素材</div>
                </div>
            `).join('');
        }

        function openTemplateEditModal(id = null) {
            const modal = document.getElementById('templateEditModal');
            const title = document.getElementById('templateEditModalTitle');
            const form = document.getElementById('templateEditForm');

            form.reset();

            if (id) {
                const template = appData.templates.find(t => t.id === id);
                if (template) {
                    title.textContent = '编辑模板';
                    document.getElementById('templateId').value = template.id;
                    document.getElementById('templateName').value = template.name;
                    document.getElementById('templateDesc').value = template.desc || '';
                    document.getElementById('templateIcon').value = template.icon || '';
                    document.getElementById('templatePriority').value = template.priority;
                    document.getElementById('templateTypes').value = template.types.join('\n');
                }
            } else {
                title.textContent = '新建模板';
            }

            modal.classList.add('active');
        }

        function closeTemplateEditModal() {
            document.getElementById('templateEditModal').classList.remove('active');
        }

        function saveTemplate() {
            const id = document.getElementById('templateId').value;
            const name = document.getElementById('templateName').value.trim();
            const desc = document.getElementById('templateDesc').value.trim();
            const icon = document.getElementById('templateIcon').value.trim();
            const priority = document.getElementById('templatePriority').value;
            const typesText = document.getElementById('templateTypes').value.trim();

            if (!name || !priority) {
                alert('请填写模板名称和优先级');
                return;
            }

            const types = typesText ? typesText.split('\n').map(t => t.trim()).filter(t => t) : [];

            if (id) {
                // 编辑
                const template = appData.templates.find(t => t.id === id);
                if (template) {
                    template.name = name;
                    template.desc = desc;
                    template.icon = icon || '⭐'.repeat(parseInt(priority));
                    template.priority = parseInt(priority);
                    template.types = types;
                }
            } else {
                // 新建
                const newTemplate = {
                    id: Date.now().toString(),
                    name,
                    desc,
                    icon: icon || '⭐'.repeat(parseInt(priority)),
                    priority: parseInt(priority),
                    types
                };
                appData.templates.push(newTemplate);
            }

            saveData();
            renderTemplateGrid();
            populateSelects();
            closeTemplateEditModal();
        }

        function deleteTemplate(id) {
            if (!confirm('确定要删除这个模板吗？')) return;

            const index = appData.templates.findIndex(t => t.id === id);
            if (index > -1) {
                appData.templates.splice(index, 1);
                saveData();
                renderTemplateGrid();
                populateSelects();
            }
        }

        // ==================== 版本操作 ====================
        function openVersionModal(id = null) {
            const modal = document.getElementById('versionModal');
            const title = document.getElementById('versionModalTitle');
            const form = document.getElementById('versionForm');

            form.reset();

            if (id) {
                const version = appData.versions.find(v => v.id === id);
                if (version) {
                    title.textContent = '编辑版本';
                    document.getElementById('versionId').value = version.id;
                    document.getElementById('versionName').value = version.name;
                    document.getElementById('versionTheme').value = version.theme || '';
                    document.getElementById('versionDesc').value = version.desc || '';
                    document.getElementById('versionStartDate').value = version.startDate;
                    document.getElementById('versionEndDate').value = version.endDate;
                }
            } else {
                title.textContent = '新建版本';
            }

            populateSelects();
            modal.classList.add('active');
        }

        function closeVersionModal() {
            document.getElementById('versionModal').classList.remove('active');
        }

        function selectTemplate() {
            const templateId = document.getElementById('versionTemplate').value;
            if (!templateId) return;

            const template = appData.templates.find(t => t.id === templateId);
            if (template) {
                const desc = document.getElementById('versionDesc');
                desc.value = `使用 ${template.name} 模板\n将自动创建以下素材：\n${template.types.map(t => '- ' + t).join('\n')}`;
            }
        }

        function saveVersion() {
            const id = document.getElementById('versionId').value;
            const name = document.getElementById('versionName').value.trim();
            const theme = document.getElementById('versionTheme').value.trim();
            const desc = document.getElementById('versionDesc').value.trim();
            const startDate = document.getElementById('versionStartDate').value;
            const endDate = document.getElementById('versionEndDate').value;
            const templateId = document.getElementById('versionTemplate').value;

            if (!name || !startDate || !endDate) {
                alert('请填写所有必填项');
                return;
            }

            if (new Date(endDate) < new Date(startDate)) {
                alert('结束日期不能早于开始日期');
                return;
            }

            let versionId = id;

            if (id) {
                // 编辑
                const version = appData.versions.find(v => v.id === id);
                if (version) {
                    version.name = name;
                    version.theme = theme;
                    version.desc = desc;
                    version.startDate = startDate;
                    version.endDate = endDate;
                    version.updatedAt = new Date().toISOString();
                }
            } else {
                // 新建
                versionId = Date.now().toString();
                const newVersion = {
                    id: versionId,
                    name,
                    theme,
                    desc,
                    startDate,
                    endDate,
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                appData.versions.push(newVersion);
            }

            // 如果选择了模板，自动创建素材
            if (!id && templateId) {
                const template = appData.templates.find(t => t.id === templateId);
                if (template && template.types.length > 0) {
                    const daysPer Material = Math.floor((new Date(endDate) - new Date(startDate)) / (1000 * 60 * 60 * 24) / template.types.length);
                    let currentDate = new Date(startDate);

                    template.types.forEach((typeName, index) => {
                        // 查找类型
                        let type = appData.types.find(t => t.name === typeName);
                        
                        // 如果类型不存在，创建它
                        if (!type) {
                            const typeId = Date.now().toString() + '_' + index;
                            type = {
                                id: typeId,
                                name: typeName,
                                code: typeName.toLowerCase().replace(/\s+/g, '_'),
                                category: '图片'
                            };
                            appData.types.push(type);
                        }

                        // 计算素材的开始和结束日期
                        const materialStartDate = new Date(currentDate);
                        currentDate.setDate(currentDate.getDate() + daysPer Material);
                        const materialEndDate = new Date(currentDate);
                        
                        // 创建素材
                        const newMaterial = {
                            id: Date.now().toString() + '_' + index,
                            name: `${name} - ${typeName}`,
                            versionId: versionId,
                            typeId: type.id,
                            priority: template.priority,
                            ownerId: appData.users[0]?.id || '',
                            method: '美术制作',
                            startDate: materialStartDate.toISOString().split('T')[0],
                            endDate: materialEndDate.toISOString().split('T')[0],
                            brief: `${template.name}自动创建`,
                            status: '未启动',
                            stage: '执行',
                            progresses: [],
                            createdAt: new Date().toISOString(),
                            updatedAt: new Date().toISOString()
                        };
                        appData.materials.push(newMaterial);
                    });
                }
            }

            saveData();
            renderAll();
            closeVersionModal();
        }

        function deleteVersion(id) {
            if (!confirm('确定要删除这个版本吗？删除后相关素材的版本信息将被清除。')) return;

            const index = appData.versions.findIndex(v => v.id === id);
            if (index > -1) {
                appData.versions.splice(index, 1);
                
                // 清除素材的版本关联
                appData.materials.forEach(m => {
                    if (m.versionId === id) {
                        m.versionId = '';
                    }
                });
                
                saveData();
                renderAll();
            }
        }

        // ==================== 类型操作 ====================
        function openTypeModal(id = null) {
            const modal = document.getElementById('typeModal');
            const title = document.getElementById('typeModalTitle');
            const form = document.getElementById('typeForm');

            form.reset();

            if (id) {
                const type = appData.types.find(t => t.id === id);
                if (type) {
                    title.textContent = '编辑类型';
                    document.getElementById('typeId').value = type.id;
                    document.getElementById('typeName').value = type.name;
                    document.getElementById('typeCode').value = type.code;
                    document.getElementById('typeCategory').value = type.category;
                }
            } else {
                title.textContent = '新建素材类型';
            }

            modal.classList.add('active');
        }

        function closeTypeModal() {
            document.getElementById('typeModal').classList.remove('active');
        }

        function saveType() {
            const id = document.getElementById('typeId').value;
            const name = document.getElementById('typeName').value.trim();
            const code = document.getElementById('typeCode').value.trim();
            const category = document.getElementById('typeCategory').value;

            if (!name || !code || !category) {
                alert('请填写所有必填项');
                return;
            }

            if (id) {
                // 编辑
                const type = appData.types.find(t => t.id === id);
                if (type) {
                    type.name = name;
                    type.code = code;
                    type.category = category;
                }
            } else {
                // 新建
                const newType = {
                    id: Date.now().toString(),
                    name,
                    code,
                    category
                };
                appData.types.push(newType);
            }

            saveData();
            renderAll();
            closeTypeModal();
        }

        function deleteType(id) {
            const count = appData.materials.filter(m => m.typeId === id).length;
            if (count > 0) {
                alert(`该类型下有 ${count} 个素材，无法删除`);
                return;
            }

            if (!confirm('确定要删除这个类型吗？')) return;

            const index = appData.types.findIndex(t => t.id === id);
            if (index > -1) {
                appData.types.splice(index, 1);
                saveData();
                renderAll();
            }
        }

        // ==================== 负责人操作 ====================
        function openUserModal(id = null) {
            const modal = document.getElementById('userModal');
            const title = document.getElementById('userModalTitle');
            const form = document.getElementById('userForm');

            form.reset();

            if (id) {
                const user = appData.users.find(u => u.id === id);
                if (user) {
                    title.textContent = '编辑负责人';
                    document.getElementById('userId').value = user.id;
                    document.getElementById('userName').value = user.name;
                    document.getElementById('userPosition').value = user.position || '';
                    document.getElementById('userEmail').value = user.email || '';
                }
            } else {
                title.textContent = '添加负责人';
            }

            modal.classList.add('active');
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        function saveUser() {
            const id = document.getElementById('userId').value;
            const name = document.getElementById('userName').value.trim();
            const position = document.getElementById('userPosition').value.trim();
            const email = document.getElementById('userEmail').value.trim();

            if (!name) {
                alert('请填写姓名');
                return;
            }

            if (id) {
                // 编辑
                const user = appData.users.find(u => u.id === id);
                if (user) {
                    user.name = name;
                    user.position = position;
                    user.email = email;
                }
            } else {
                // 新建
                const newUser = {
                    id: Date.now().toString(),
                    name,
                    position,
                    email
                };
                appData.users.push(newUser);
            }

            saveData();
            renderAll();
            closeUserModal();
        }

        function deleteUser(id) {
            const count = appData.materials.filter(m => m.ownerId === id).length;
            if (count > 0) {
                alert(`该负责人负责 ${count} 个素材，无法删除`);
                return;
            }

            if (!confirm('确定要删除这个负责人吗？')) return;

            const index = appData.users.findIndex(u => u.id === id);
            if (index > -1) {
                appData.users.splice(index, 1);
                saveData();
                renderAll();
            }
        }

        // ==================== 图片预览 ====================
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.innerHTML = `<img src="${e.target.result}" alt="预览">`;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function previewProgressImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('progressImagePreview');
                    preview.innerHTML = `<img src="${e.target.result}" alt="预览">`;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // ==================== 工具函数 ====================
        function exportData() {
            const data = JSON.stringify(appData, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `素材管理数据_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showHelp() {
            alert(`

        }

        // ==================== 启动应用 ====================
        window.onload = init;

        // 点击模态框外部关闭
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        };
    </script>
