<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材进度管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --success: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
            --gray-50: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-600: #6c757d;
            --gray-900: #212529;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 20px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 导航栏 */
        .navbar {
            background: var(--gray-50);
            padding: 15px 30px;
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--gray-300);
            overflow-x: auto;
        }

        .nav-btn {
            background: white;
            color: var(--gray-600);
            border: 1px solid var(--gray-300);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* 页面 */
        .page {
            display: none;
            padding: 30px;
        }

        .page.active {
            display: block;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--gray-900);
        }

        /* 工具栏 */
        .toolbar {
            background: var(--gray-50);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-600);
        }

        select, input[type="date"], input[type="text"] {
            padding: 8px 12px;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            font-size: 13px;
            background: white;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        /* 视图切换 */
        .view-toggle {
            display: flex;
            gap: 5px;
            background: white;
            padding: 4px;
            border-radius: 8px;
        }

        .view-toggle-btn {
            background: transparent;
            color: var(--gray-600);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .view-toggle-btn.active {
            background: var(--primary);
            color: white;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-card-title {
            font-size: 13px;
            color: var(--gray-600);
            margin-bottom: 10px;
        }

        .stat-card-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 10px;
        }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .material-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }

        .material-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 列表视图 */
        .list-view {
            display: none;
        }

        .list-view.active {
            display: block;
        }

        .material-list-item {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .material-list-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* 甘特图 */
        .gantt-wrapper {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            overflow: hidden;
        }

        .gantt-container {
            overflow-x: auto;
            max-height: 600px;
        }

        .gantt-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .gantt-table th {
            background: var(--gray-50);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--gray-300);
            position: sticky;
            top: 0;
        }

        .gantt-table td {
            padding: 10px;
            border-bottom: 1px solid var(--gray-200);
        }

        .gantt-table tr:hover {
            background: var(--gray-50);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray-600);
        }

        .modal-body {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 6px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            font-size: 13px;
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="logo">📊 素材进度管理系统</div>
            <button class="header-btn" onclick="showTemplateModal()">📋 模板管理</button>
        </div>

        <!-- 导航栏 -->
        <div class="navbar">
            <button class="nav-btn active" onclick="switchPage('overview')">📊 素材总览</button>
            <button class="nav-btn" onclick="switchPage('types')">🎯 素材类型</button>
            <button class="nav-btn" onclick="switchPage('list')">📋 素材列表</button>
            <button class="nav-btn" onclick="switchPage('dashboard')">📌 综合看板</button>
            <button class="nav-btn" onclick="switchPage('responsibility')">👥 责任面板</button>
            <button class="nav-btn" onclick="switchPage('versions')">📅 版本管理</button>
        </div>

        <!-- 素材总览页 -->
        <div id="overview" class="page active">
            <h2 class="page-title">素材总览</h2>
            
            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="toolbar-group">
                    <span class="toolbar-label">版本筛选：</span>
                    <select id="versionFilter">
                        <option value="all">全部版本</option>
                    </select>
                </div>
                <div class="toolbar-group">
                    <span class="toolbar-label">时间范围：</span>
                    <input type="date" id="startDate">
                    <span>至</span>
                    <input type="date" id="endDate">
                </div>
                <button class="btn btn-success" onclick="showAddMaterialModal()">➕ 新建素材</button>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-card-title">总素材数</div>
                    <div class="stat-card-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-title">进行中</div>
                    <div class="stat-card-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-title">已完成</div>
                    <div class="stat-card-value">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-title">未开始</div>
                    <div class="stat-card-value">0</div>
                </div>
            </div>

            <!-- 甘特图 -->
            <div class="gantt-wrapper">
                <div class="gantt-container">
                    <table class="gantt-table">
                        <thead>
                            <tr>
                                <th>素材名称</th>
                                <th>版本</th>
                                <th>类型</th>
                                <th>负责人</th>
                                <th>状态</th>
                                <th>时间线</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="ganttBody">
                            <tr>
                                <td colspan="7" style="text-align: center; padding: 40px; color: #999;">
                                    暂无数据，请点击"新建素材"添加
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 素材类型页 -->
        <div id="types" class="page">
            <h2 class="page-title">素材类型管理</h2>
            <div class="toolbar">
                <button class="btn btn-success" onclick="showAddTypeModal()">➕ 新建类型</button>
            </div>
            <div class="cards-grid" id="typesGrid">
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">
                    暂无类型，请点击"新建类型"添加
                </div>
            </div>
        </div>

        <!-- 素材列表页 -->
        <div id="list" class="page">
            <h2 class="page-title">素材列表</h2>
            
            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="toolbar-group">
                    <span class="toolbar-label">状态筛选：</span>
                    <select id="statusFilter">
                        <option value="all">全部状态</option>
                        <option value="未开始">未开始</option>
                        <option value="进行中">进行中</option>
                        <option value="已完成">已完成</option>
                    </select>
                </div>
                <div class="view-toggle">
                    <button class="view-toggle-btn active" onclick="switchView('card')">🔲 卡片</button>
                    <button class="view-toggle-btn" onclick="switchView('list')">📋 列表</button>
                </div>
                <button class="btn btn-success" onclick="showAddMaterialModal()">➕ 新建素材</button>
            </div>

            <!-- 卡片视图 -->
            <div id="cardView" class="cards-grid">
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">
                    暂无素材
                </div>
            </div>

            <!-- 列表视图 -->
            <div id="listView" class="list-view">
                <div style="text-align: center; padding: 40px; color: #999;">
                    暂无素材
                </div>
            </div>
        </div>

        <!-- 其他页面占位 -->
        <div id="dashboard" class="page">
            <h2 class="page-title">综合看板</h2>
            <p style="text-align: center; padding: 40px; color: #999;">功能开发中...</p>
        </div>
        <div id="responsibility" class="page">
            <h2 class="page-title">责任面板</h2>
            <p style="text-align: center; padding: 40px; color: #999;">功能开发中...</p>
        </div>
        <div id="versions" class="page">
            <h2 class="page-title">版本管理</h2>
            <p style="text-align: center; padding: 40px; color: #999;">功能开发中...</p>
        </div>
    </div>

    <!-- 新建素材模态框 -->
    <div id="addMaterialModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">新建素材</h3>
                <button class="modal-close" onclick="closeModal('addMaterialModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">素材名称</label>
                    <input type="text" class="form-input" id="materialName" placeholder="请输入素材名称">
                </div>
                <div class="form-group">
                    <label class="form-label">版本</label>
                    <input type="text" class="form-input" id="materialVersion" placeholder="如：2025年1月">
                </div>
                <div class="form-group">
                    <label class="form-label">类型</label>
                    <select class="form-select" id="materialType">
                        <option value="图片">图片</option>
                        <option value="视频">视频</option>
                        <option value="网页">网页</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">负责人</label>
                    <input type="text" class="form-input" id="materialOwner" placeholder="请输入负责人">
                </div>
                <div class="form-group">
                    <label class="form-label">开始日期</label>
                    <input type="date" class="form-input" id="materialStartDate">
                </div>
                <div class="form-group">
                    <label class="form-label">结束日期</label>
                    <input type="date" class="form-input" id="materialEndDate">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('addMaterialModal')">取消</button>
                <button class="btn btn-success" onclick="saveMaterial()">保存</button>
            </div>
        </div>
    </div>

    <!-- 模板管理模态框 -->
    <div id="templateModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">模板管理</h3>
                <button class="modal-close" onclick="closeModal('templateModal')">&times;</button>
            </div>
            <div class="modal-body">
                <p style="text-align: center; padding: 40px; color: #999;">模板功能开发中...</p>
            </div>
        </div>
    </div>

    <script>
        // 全局数据
        let materials = [];
        let currentView = 'card';

        // 页面切换
        function switchPage(pageId) {
            // 隐藏所有页面
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // 显示目标页面
            document.getElementById(pageId).classList.add('active');
            
            // 更新导航按钮状态
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // 视图切换
        function switchView(viewType) {
            currentView = viewType;
            const cardView = document.getElementById('cardView');
            const listView = document.getElementById('listView');
            const toggleBtns = document.querySelectorAll('.view-toggle-btn');
            
            if (viewType === 'card') {
                cardView.style.display = 'grid';
                listView.classList.remove('active');
                toggleBtns[0].classList.add('active');
                toggleBtns[1].classList.remove('active');
            } else {
                cardView.style.display = 'none';
                listView.classList.add('active');
                toggleBtns[0].classList.remove('active');
                toggleBtns[1].classList.add('active');
            }
        }

        // 显示模态框
        function showAddMaterialModal() {
            document.getElementById('addMaterialModal').classList.add('active');
        }

        function showTemplateModal() {
            document.getElementById('templateModal').classList.add('active');
        }

        function showAddTypeModal() {
            alert('新建类型功能开发中...');
        }

        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        // 保存素材
        function saveMaterial() {
            const material = {
                id: Date.now(),
                name: document.getElementById('materialName').value,
                version: document.getElementById('materialVersion').value,
                type: document.getElementById('materialType').value,
                owner: document.getElementById('materialOwner').value,
                startDate: document.getElementById('materialStartDate').value,
                endDate: document.getElementById('materialEndDate').value,
                status: '未开始'
            };

            if (!material.name) {
                alert('请输入素材名称');
                return;
            }

            materials.push(material);
            closeModal('addMaterialModal');
            updateAllViews();
            
            // 清空表单
            document.getElementById('materialName').value = '';
            document.getElementById('materialVersion').value = '';
            document.getElementById('materialOwner').value = '';
            document.getElementById('materialStartDate').value = '';
            document.getElementById('materialEndDate').value = '';
        }

        // 更新所有视图
        function updateAllViews() {
            updateGanttChart();
            updateStats();
        }

        // 更新甘特图
        function updateGanttChart() {
            const tbody = document.getElementById('ganttBody');
            
            if (materials.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px; color: #999;">
                            暂无数据，请点击"新建素材"添加
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = materials.map(m => `
                <tr>
                    <td><strong>${m.name}</strong></td>
                    <td>${m.version || '-'}</td>
                    <td>${m.type}</td>
                    <td>${m.owner || '-'}</td>
                    <td><span style="padding: 4px 8px; border-radius: 4px; background: #e3f2fd; color: #1976d2; font-size: 11px;">${m.status}</span></td>
                    <td>${m.startDate || '-'} ~ ${m.endDate || '-'}</td>
                    <td>
                        <button class="btn btn-small" onclick="editMaterial(${m.id})">编辑</button>
                        <button class="btn btn-small btn-danger" onclick="deleteMaterial(${m.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            const total = materials.length;
            const inProgress = materials.filter(m => m.status === '进行中').length;
            const completed = materials.filter(m => m.status === '已完成').length;
            const notStarted = materials.filter(m => m.status === '未开始').length;

            const statCards = document.querySelectorAll('.stat-card-value');
            statCards[0].textContent = total;
            statCards[1].textContent = inProgress;
            statCards[2].textContent = completed;
            statCards[3].textContent = notStarted;
        }

        // 编辑素材
        function editMaterial(id) {
            alert('编辑功能开发中...');
        }

        // 删除素材
        function deleteMaterial(id) {
            if (confirm('确定要删除这个素材吗？')) {
                materials = materials.filter(m => m.id !== id);
                updateAllViews();
            }
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }

        // 初始化
        updateAllViews();
    </script>
</body>
</html>
