<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大话西游素材进度管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --success: #4caf50;
            --danger: #f44336;
            --warning: #ff9800;
            --info: #2196f3;
            --purple: #9c27b0;
            --s-rank: #ff6b6b;
            --a-rank: #4ecdc4;
            --b-rank: #95e1d3;
            --gray-50: #f8f9fa;
            --gray-100: #f0f0f0;
            --gray-200: #e9ecef;
            --gray-300: #dee2e6;
            --gray-400: #ced4da;
            --gray-500: #adb5bd;
            --gray-600: #6c757d;
            --gray-700: #495057;
            --gray-800: #343a40;
            --gray-900: #212529;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.15);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.18);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--gray-900);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
        }

        /* ==================== 头部 ==================== */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 25px 35px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .year-badge {
            background: rgba(255,255,255,0.25);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .sync-status {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .sync-indicator {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 9px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        /* ==================== 导航栏 ==================== */
        .navbar {
            background: var(--gray-50);
            padding: 18px 35px;
            display: flex;
            gap: 12px;
            border-bottom: 2px solid var(--gray-200);
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .navbar::-webkit-scrollbar {
            height: 6px;
        }

        .navbar::-webkit-scrollbar-thumb {
            background: var(--gray-400);
            border-radius: 3px;
        }

        .nav-btn {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--shadow-sm);
        }

        .nav-btn-icon {
            font-size: 16px;
        }

        /* ==================== 页面容器 ==================== */
        .page {
            display: none;
            padding: 35px;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .page-desc {
            font-size: 14px;
            color: var(--gray-600);
        }

        /* ==================== 工具栏 ==================== */
        .toolbar {
            background: var(--gray-50);
            padding: 22px;
            border-radius: 10px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 18px;
            box-shadow: var(--shadow-sm);
        }

        .toolbar-left {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700);
            white-space: nowrap;
        }

        .view-toggle {
            display: flex;
            gap: 6px;
            background: white;
            padding: 5px;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
        }

        .view-toggle-btn {
            background: transparent;
            color: var(--gray-600);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .view-toggle-btn:hover {
            background: var(--gray-100);
        }

        .view-toggle-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        select, input[type="date"], input[type="text"], input[type="number"], input[type="month"] {
            padding: 9px 14px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 13px;
            background: white;
            transition: all 0.3s;
            min-width: 160px;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .btn-success { background: var(--success); }
        .btn-success:hover { background: #45a049; }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #da190b; }
        .btn-warning { background: var(--warning); }
        .btn-warning:hover { background: #e68900; }
        .btn-secondary { background: var(--gray-500); }
        .btn-secondary:hover { background: var(--gray-600); }

        .btn-small {
            padding: 7px 14px;
            font-size: 12px;
        }

        .btn-icon {
            padding: 8px 12px;
            min-width: auto;
        }

        /* ==================== 统计卡片 ==================== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 24px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transform: scaleY(0);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
        }

        .stat-card:hover::before {
            transform: scaleY(1);
        }

        .stat-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 18px;
        }

        .stat-card-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .icon-primary { background: rgba(102,126,234,0.12); color: var(--primary); }
        .icon-success { background: rgba(76,175,80,0.12); color: var(--success); }
        .icon-warning { background: rgba(255,152,0,0.12); color: var(--warning); }
        .icon-danger { background: rgba(244,67,54,0.12); color: var(--danger); }
        .icon-info { background: rgba(33,150,243,0.12); color: var(--info); }

        .stat-card-title {
            font-size: 13px;
            color: var(--gray-600);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-card-value {
            font-size: 38px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 12px;
            line-height: 1;
        }

        .stat-card-desc {
            font-size: 12px;
            color: var(--gray-500);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-trend {
            font-weight: 600;
        }

        .stat-trend.up { color: var(--success); }
        .stat-trend.down { color: var(--danger); }

        .stat-card-progress {
            margin-top: 14px;
            height: 6px;
            background: var(--gray-200);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-card-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        /* ==================== 版本定级标签 ==================== */
        .rank-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .rank-s {
            background: rgba(255,107,107,0.15);
            color: #d63031;
            border: 1px solid rgba(255,107,107,0.3);
        }

        .rank-a {
            background: rgba(78,205,196,0.15);
            color: #00b894;
            border: 1px solid rgba(78,205,196,0.3);
        }

        .rank-b {
            background: rgba(149,225,211,0.15);
            color: #00cec9;
            border: 1px solid rgba(149,225,211,0.3);
        }

        /* ==================== 卡片视图 ==================== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .version-card {
            background: white;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .version-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary);
        }

        .version-card-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--gray-50) 0%, white 100%);
            border-bottom: 1px solid var(--gray-200);
        }

        .version-card-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }

        .version-card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-900);
            line-height: 1.4;
            flex: 1;
        }

        .version-card-date {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            white-space: nowrap;
            background: rgba(102,126,234,0.1);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .version-card-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .version-card-body {
            padding: 20px;
        }

        .version-card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-100);
        }

        .version-card-row:last-child {
            border-bottom: none;
        }

        .version-card-label {
            font-size: 12px;
            color: var(--gray-600);
            font-weight: 600;
        }

        .version-card-value {
            font-size: 13px;
            color: var(--gray-900);
            font-weight: 500;
        }

        .version-card-footer {
            padding: 16px 20px;
            background: var(--gray-50);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* ==================== 列表视图 ==================== */
        .list-view {
            display: none;
        }

        .list-view.active {
            display: block;
        }

        .version-list-item {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 18px 22px;
            margin-bottom: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .version-list-item:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .version-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 20px;
        }

        .version-list-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-900);
            flex: 1;
        }

        .version-list-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .version-list-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .version-list-meta-label {
            font-size: 12px;
            color: var(--gray-600);
            font-weight: 600;
        }

        .version-list-meta-value {
            font-size: 13px;
            color: var(--gray-900);
            font-weight: 500;
        }

        /* ==================== 甘特图 ==================== */
        .gantt-wrapper {
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .gantt-header {
            padding: 20px;
            background: var(--gray-50);
            border-bottom: 2px solid var(--gray-300);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .gantt-header-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .gantt-container {
            overflow-x: auto;
            overflow-y: auto;
            max-height: 650px;
        }

        .gantt-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .gantt-table th {
            background: var(--gray-50);
            padding: 14px 12px;
            text-align: left;
            font-weight: 700;
            font-size: 12px;
            color: var(--gray-700);
            border-bottom: 2px solid var(--gray-300);
            position: sticky;
            top: 0;
            z-index: 10;
            white-space: nowrap;
        }

        .gantt-table td {
            padding: 12px;
            border-bottom: 1px solid var(--gray-200);
            vertical-align: middle;
        }

        .gantt-table tr:hover {
            background: var(--gray-50);
        }

        .gantt-version-name {
            font-weight: 600;
            color: var(--gray-900);
            min-width: 220px;
        }

        .gantt-timeline {
            min-width: 900px;
            position: relative;
            padding: 8px 0;
        }

        .progress-bar-wrapper {
            position: relative;
            height: 36px;
            background: var(--gray-100);
            border-radius: 8px;
            overflow: visible;
        }

        .progress-bar {
            position: absolute;
            height: 100%;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            padding: 0 12px;
            color: white;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
            overflow: visible;
            box-shadow: var(--shadow-sm);
        }

        .progress-bar:hover {
            filter: brightness(1.15);
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            z-index: 5;
        }

        .progress-bar-s {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        .progress-bar-a {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a8a0 100%);
        }

        .progress-bar-b {
            background: linear-gradient(135deg, #95e1d3 0%, #80cfc2 100%);
        }

        /* ==================== 素材进度指示器 ==================== */
        .material-progress {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .material-progress-bar {
            flex: 1;
            height: 8px;
            background: var(--gray-200);
            border-radius: 4px;
            overflow: hidden;
        }

        .material-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #66bb6a);
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .material-progress-text {
            font-size: 12px;
            font-weight: 700;
            color: var(--gray-700);
            min-width: 50px;
            text-align: right;
        }

        /* ==================== 模态框 ==================== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 95%;
            max-width: 900px;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 24px 28px;
            border-bottom: 2px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--gray-50);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--gray-500);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--gray-200);
            color: var(--gray-900);
        }

        .modal-body {
            padding: 28px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group-full {
            grid-column: 1 / -1;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .form-label-required::after {
            content: '*';
            color: var(--danger);
            margin-left: 4px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            font-size: 13px;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-footer {
            padding: 20px 28px;
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            background: var(--gray-50);
        }

        /* ==================== 素材类型网格 ==================== */
        .material-types-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }

        .material-type-item {
            background: var(--gray-50);
            border: 1px solid var(--gray-300);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;

        // ==================== 渲染甘特图 ====================
        function renderGanttView() {
            const table = document.getElementById('gantt-table');
            const filteredVersions = getFilteredVersions();

            // 计算时间范围
            const dates = filteredVersions.map(v => new Date(v.date));
            const minDate = new Date(Math.min(...dates));
            const maxDate = new Date(Math.max(...dates));

            // 生成月份表头
            const months = [];
            let currentDate = new Date(minDate.getFullYear(), minDate.getMonth(), 1);
            while (currentDate <= maxDate) {
                months.push({
                    year: currentDate.getFullYear(),
                    month: currentDate.getMonth() + 1,
                    name: `${currentDate.getFullYear()}年${currentDate.getMonth() + 1}月`
                });
                currentDate.setMonth(currentDate.getMonth() + 1);
            }

            // 渲染表格
            table.innerHTML = `
                <thead>
                    <tr>
                        <th style="min-width: 280px;">版本名称</th>
                        <th style="min-width: 100px;">定级</th>
                        <th style="min-width: 120px;">责任营销</th>
                        <th style="min-width: 140px;">责任策划</th>
                        <th style="min-width: 100px;">进度</th>
                        <th style="min-width: 1000px;">时间线</th>
                    </tr>
                </thead>
                <tbody>
                    ${filteredVersions.map(v => {
                        const versionDate = new Date(v.date);
                        const daysDiff = Math.floor((versionDate - minDate) / (1000 * 60 * 60 * 24));
                        const totalDays = Math.floor((maxDate - minDate) / (1000 * 60 * 60 * 24)) + 30;
                        const leftPercent = (daysDiff / totalDays) * 100;
                        const widthPercent = 8; // 固定宽度

                        return `
                            <tr>
                                <td class="gantt-version-name">${v.name}</td>
                                <td>
                                    <span class="rank-badge rank-${v.rank.toLowerCase()}">${v.rank}</span>
                                </td>
                                <td>${v.marketing}</td>
                                <td>${v.planner}</td>
                                <td>
                                    <div class="material-progress">
                                        <div class="material-progress-text">${v.progress}%</div>
                                    </div>
                                </td>
                                <td class="gantt-timeline">
                                    <div class="progress-bar-wrapper">
                                        <div class="progress-bar progress-bar-${v.rank.toLowerCase()}"
                                             style="left: ${leftPercent}%; width: ${widthPercent}%;"
                                             onclick="editVersionProgress(${v.id})"
                                             title="${v.name}\n上线时间: ${v.date}\n进度: ${v.progress}%">
                                            ${v.date.substring(5)}
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            `;
        }

        function getFilteredVersions() {
            let filtered = [...versions];

            if (timeFilter !== 'all') {

            }

            // 定级筛选
            const rankFilter = document.getElementById('rankFilter')?.value || 'all';
            if (rankFilter !== 'all') {
                filtered = filtered.filter(v => v.rank === rankFilter);
            }

            // 状态筛选
            const statusFilter = document.getElementById('statusFilter')?.value || 'all';
            if (statusFilter !== 'all') {
                filtered = filtered.filter(v => v.status === statusFilter);
            }

            // 搜索筛选
            const searchInput = document.getElementById('searchInput')?.value || '';
            if (searchInput) {
                filtered = filtered.filter(v => 
                    v.name.toLowerCase().includes(searchInput.toLowerCase())
                );
            }

            return filtered;
        }

        function getStatusBadge(status) {
            const statusMap = {
                'planning': { text: '策划中', color: 'var(--info)' },
                'production': { text: '制作中', color: 'var(--warning)' },
                'review': { text: '审核中', color: 'var(--purple)' },
                'completed': { text: '已完成', color: 'var(--success)' }
            };

            const s = statusMap[status] || statusMap['planning'];
            return `<span style="background: ${s.color}; color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700;">${s.text}</span>`;
        }

            if (currentView === 'card') {
                renderCardView();
            } else if (currentView === 'list') {

            } else if (currentView === 'gantt') {

            // 渲染素材类型选择

            container.innerHTML = materialTypes.map(mt => `

        function openTemplateModal() {
            // 渲染模板选择列表

            container.innerHTML = templates.map(t => {

            }).join('');

            openModal('template-select-modal');

        function renderTemplateSelectList() {
            openTemplateModal();

        function applyTemplate() {
            if (!selectedTemplate) {
                alert('请先选择一个模板');
                return;
            }

            const template = templates.find(t => t.id === selectedTemplate);
            if (template) {
                // 应用模板到新版本表单
                closeModal('template-select-modal');
                openCreateVersionModal();

                // 填充素材数量
                Object.keys(template.materials).forEach(key => {
                    const input = document.getElementById(`material-${key}`);
                    if (input) {
                        input.value = template.materials[key];
                    }
                });

                // 设置定级
                document.getElementById('version-rank').value = template.rank;
            }
        }
